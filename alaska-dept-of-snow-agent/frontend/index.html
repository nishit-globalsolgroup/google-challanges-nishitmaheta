<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alaska Department of Snow Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="chat-container">
    <h1>Alaska Department of Snow</h1>
    <p class="subtitle">Online public information assistant</p>

    <div id="chat-box" class="chat-box"></div>

    <form id="chat-form">
      <input
        id="question"
        type="text"
        placeholder="Ask about plowing, closures, or road conditions..."
        required
      />
      <button type="submit">Ask</button>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
